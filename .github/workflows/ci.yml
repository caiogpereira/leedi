name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  # Dummy values for @leedi/config boot-time validation in build/test.
  # Real secrets are never needed here — these are structurally valid placeholders.
  # Keep in sync with packages/config/src/schema.ts (every REQUIRED var must be present).
  NODE_ENV: test
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_db
  SENTRY_DSN: https://ci@sentry.io/1
  POSTHOG_KEY: phc_ci_placeholder
  BETTER_STACK_TOKEN: ci_better_stack_token
  API_PORT: "3003"
  BETTER_AUTH_SECRET: ci_better_auth_secret_at_least_32_chars
  BETTER_AUTH_URL: http://localhost:3000
  RESEND_API_KEY: re_ci_placeholder
  UPSTASH_REDIS_REST_URL: https://ci.upstash.io
  UPSTASH_REDIS_REST_TOKEN: ci_upstash_token
  WORKSPACE_ID: 00000000-0000-0000-0000-000000000000
  ANTHROPIC_API_KEY: sk-ant-ci-placeholder
  ENCRYPTION_MASTER_KEY: BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc=
  WHATSAPP_APP_SECRET: ci_whatsapp_app_secret
  WHATSAPP_WEBHOOK_VERIFY_TOKEN: ci_whatsapp_verify_token
  QSTASH_TOKEN: ci_qstash_token
  QSTASH_CURRENT_SIGNING_KEY: sig_ci_current
  QSTASH_NEXT_SIGNING_KEY: sig_ci_next
  ASAAS_API_KEY: ci_asaas_key
  ASAAS_WEBHOOK_TOKEN: ci_asaas_webhook_token
  VAPID_PUBLIC_KEY: BPXkn26tyFEGWOuXyoxReJvpnk6lXnCX6Lg4fiaCrVtk6ej0RxyvZZKb2bAIMejGcBzgArZuO_7Wynmvie-9vmY
  VAPID_PRIVATE_KEY: h4XDU8qE3m3z0Kib7ERi8vqpRTIVFJtNZonZUlgSJjE
  VAPID_SUBJECT: mailto:ci@leedi.digital

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        env:
          # Optional Turborepo remote cache — CI works without it
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  migrate-check:
    name: Migration Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate migrations (offline check — no DB connection)
        # drizzle-kit check validates migration consistency without applying
        # Real migrations are applied via pnpm --filter @leedi/db migrate:run in deploy pipeline
        run: pnpm --filter @leedi/db check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # SCOPED test gate (code review 2026-06-04; @leedi/api re-included 2026-06-21, PL-8).
      # Only @leedi/db stays EXCLUDED — see
      # _bmad-output/implementation-artifacts/epic-1-test-ci-backlog.md:
      #   - @leedi/db: 2 RLS suites need a non-BYPASSRLS `leedi_app` role + live DB (deferred → PL-3).
      # @leedi/api's cross-file test-state pollution was resolved over Epics 13–20; the full suite
      # (236 tests / 45 files) is now stable when run together (verified 3× green, 2026-06-21).
      - name: Test (scoped — excludes @leedi/db)
        run: pnpm exec turbo run test --filter='!@leedi/db'
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
